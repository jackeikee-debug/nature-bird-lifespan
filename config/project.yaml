project:
  name: bird_lifespan_genome_maintenance
  question: >
    Do birds and bats show convergent lifespan residual elevation linked to
    long-term somatic maintenance mechanisms?
  primary_response: max_lifespan_years
  first_pass_predictors:
    - body_mass_g
    - clade
    - flight_status
  current_phase: week_1_species_table

